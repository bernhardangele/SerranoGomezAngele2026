# A title to describe the published resource.
title: "Articles as flankers: The effect of grammatical gender depends on the task"

# Additional information about the resource, e.g., a brief abstract.
description: |
  We report three experiments using a novel variation of the word flanker paradigm (Dare & Shillcock, 2013) to test whether readers process articles and nouns together, taking advantage of the fact that, in Spanish, there must be gender agreement between articles and nouns. In Experiment 1, we asked Spanish native speakers to make grammatical gender judgments about centrally presented Spanish nouns (e.g. ‘mesa’, ‘table’). The central nouns could be presented with congruent article flankers (‘la mesa la’), incongruent article flankers (‘el mesa el’) or no flankers. We found that responses were slower and less accurate in the incongruent condition. In Experiment 2, a lexical decision task, this effect was weaker than in Experiment 1. In Experiment 3, a semantic categorization task, we found no evidence of the article flanker effect. This suggests that articles and nouns are processed jointly, but the impact of this joint processing depends on the task.

